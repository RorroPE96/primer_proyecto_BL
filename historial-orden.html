<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Orden de Trabajo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#f5f6fa; --surface:#fff; --border:#e4e7ed; --border2:#d0d5dd;
  --accent:#2563eb; --accent-l:#eff4ff;
  --text:#111827; --text2:#374151; --muted:#6b7280; --muted2:#9ca3af;
  --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
header h1{font-size:16px;font-weight:700;}
header p{font-size:12px;color:var(--muted);}

main{padding:28px;max-width:900px;margin:0 auto;}

.search-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:var(--shadow);margin-bottom:24px;}
.search-card label{font-size:13px;font-weight:600;color:var(--text2);display:block;margin-bottom:8px;}
.search-row{display:flex;gap:10px;}
.search-row input{
  flex:1;padding:12px 14px;border-radius:var(--radius);border:1.5px solid var(--border2);
  font-size:15px;outline:none;font-family:'JetBrains Mono',monospace;
}
.search-row input:focus{border-color:var(--accent);}
.search-row button{
  padding:12px 22px;border-radius:var(--radius);border:none;background:var(--accent);
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;
}
.search-row button:hover{background:#1d4ed8;}
.hint{font-size:12px;color:var(--muted2);margin-top:8px;}

/* result card */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:var(--shadow);}
.result-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.result-orden{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--accent);}
.result-serie{text-align:right;}
.result-serie .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.result-serie .val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--text2);}

.result-extra-fields{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.result-field .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.result-field .val{font-size:14px;font-weight:600;color:var(--text2);word-break:break-word;}

.bitacora-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.log-entry{margin-bottom:8px;padding:10px 14px;background:var(--accent-l);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;}
.log-entry .log-date{color:var(--accent);font-weight:700;font-family:'JetBrains Mono',monospace;font-size:11px;margin-bottom:3px;}
.log-entry .log-text{color:var(--text2);font-size:13.5px;line-height:1.5;}
.no-logs{font-size:13px;color:var(--muted2);text-align:center;padding:20px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .icon{font-size:48px;margin-bottom:14px;}
.empty-state h2{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px;}
.empty-state p{font-size:13px;}

#toast{position:fixed;bottom:22px;right:22px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;box-shadow:var(--shadow-md);transform:translateY(70px);opacity:0;transition:all .25s;z-index:999;}
#toast.show{transform:translateY(0);opacity:1;}

@media(max-width:600px){
  main{padding:16px;}
  .search-row{flex-direction:column;}
  .result-extra-fields{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<header>
  <div class="logo-icon">🕓</div>
  <div>
    <h1>Historial de Orden de Trabajo</h1>
    <p>Bitácora Completa por WO</p>
  </div>
</header>

<main>
  <div class="search-card">
    <label for="searchInput">Número de Orden del Trabajo o Número de Serie</label>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Ej: 123456, últimos dígitos, o N° de Serie…" onkeydown="if(event.key==='Enter') buscarOrden()">
      <button onclick="buscarOrden()">🔍 Buscar</button>
    </div>
    <p class="hint">Puedes escribir el número completo o los últimos dígitos de la orden, o el número de serie.</p>
  </div>

  <div id="resultArea"></div>
</main>

<div id="toast"></div>

<script>
/* ════════════════════════════════════════════
   Misma fuente de datos que la app principal
   ════════════════════════════════════════════ */
const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzPDXylCsr98Dmt-MX0Un2C3TSEatckUpWKCOvzMV6-pKbtxlETPzZ0oMF4DWdHeDHeVQ/exec";

let allOrders = [];
let allLogs = [];

function cloudEnabled(){ return !!SHEETS_API_URL; }

async function loadOrdenes(){
  if(!cloudEnabled()) return;
  try{
    const res = await fetch(SHEETS_API_URL+'?type=ordenes');
    const json = await res.json();
    if(json.success) allOrders = json.data || [];
  }catch(err){ console.error('Error cargando órdenes:', err); }
}

async function loadBitacora(){
  if(!cloudEnabled()) return;
  try{
    const res = await fetch(SHEETS_API_URL+'?type=bitacora');
    const json = await res.json();
    if(json.success) allLogs = json.data || [];
  }catch(err){ console.error('Error cargando bitácora:', err); }
}

function formatLogDate(fecha){
  if(fecha instanceof Date) return `${String(fecha.getDate()).padStart(2,'0')}/${String(fecha.getMonth()+1).padStart(2,'0')}`;
  const s = String(fecha||'');
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(isoMatch) return `${isoMatch[3]}/${isoMatch[2]}`;
  const dmyMatch = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  return dmyMatch ? `${dmyMatch[1]}/${dmyMatch[2]}` : s.slice(0,5);
}

function buscarOrden(){
  const q = document.getElementById('searchInput').value.trim();
  const area = document.getElementById('resultArea');

  if(!q){ showToast('⚠ Escribe un número de orden'); return; }

  const orden = allOrders.find(o => {
    const num = String(o['Orden del Trabajo']||'');
    const serie = String(o['Serie']||'').toLowerCase();
    const qLower = q.toLowerCase();
    return num === q || (/^\d+$/.test(q) && num.endsWith(q)) || (serie && serie === qLower);
  });

  if(!orden){
    area.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <h2>No se encontró la orden</h2>
        <p>Verifica el número e intenta nuevamente.</p>
      </div>`;
    return;
  }

  const numOrden = String(orden['Orden del Trabajo']||'');
  const logs = allLogs
    .filter(l => String(l['Orden del Trabajo']||'') === numOrden)
    .map(l => ({date: formatLogDate(l['Fecha']), text: l['Nota / Actualización'], tecnico: l['Técnico Asignado']}));

  const excelLog = orden['Actualización Diaria']
    ? `<div class="log-entry"><div class="log-date">Excel</div><div class="log-text">${esc(orden['Actualización Diaria'])}</div></div>`
    : '';

  const logsHTML = logs.map(l => `
    <div class="log-entry">
      <div class="log-date">${esc(l.date)}${l.tecnico ? ' · '+esc(l.tecnico) : ''}</div>
      <div class="log-text">${esc(l.text)}</div>
    </div>`).join('');

  area.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div>
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Orden de Trabajo</div>
          <div class="result-orden"># ${esc(numOrden)}</div>
        </div>
        <div class="result-serie">
          <div class="lbl">Número de Serie</div>
          <div class="val">${esc(orden['Serie'])||'—'}</div>
        </div>
      </div>
      <div class="result-extra-fields">
        <div class="result-field"><div class="lbl">Cliente</div><div class="val">${esc(orden['Contacto'])||'—'}</div></div>
        <div class="result-field"><div class="lbl">Técnico Asignado</div><div class="val">${esc(orden['Técnico Asignado'])||'—'}</div></div>
        <div class="result-field"><div class="lbl">Servicio</div><div class="val">${esc(orden['Servicio'])||'—'}</div></div>
        <div class="result-field"><div class="lbl">MT</div><div class="val">${esc(orden['MT'])||'—'}</div></div>
      </div>
      <div class="bitacora-title">📋 Bitácora</div>
      ${excelLog || logsHTML ? excelLog+logsHTML : '<div class="no-logs">Sin actualizaciones registradas para esta orden.</div>'}
    </div>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

/* INIT */
(async function init(){
  if(cloudEnabled()){
    await Promise.all([loadOrdenes(), loadBitacora()]);
  } else {
    document.getElementById('resultArea').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠</div>
        <h2>Bitácora en la nube no configurada</h2>
        <p>Configura SHEETS_API_URL para poder buscar órdenes.</p>
      </div>`;
  }
})();
</script>
</body>
</html>
